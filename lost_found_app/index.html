<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost & Found</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body style="background-color: #f2ebff !important; min-height: 100vh;">

    <nav class="navbar navbar-dark sticky-top py-3" style="background: linear-gradient(to right, #6200ea, #9d46ff);"> 
        <div class="container-fluid d-flex align-items-center justify-content-between">
            <span class="navbar-brand m-0 d-flex align-items-center fw-bold" style="font-size: 1.6rem;">
                <i class="bi bi-search-heart me-2"></i>UUM FindIt
            </span>
            <div>
                <button onclick="logout()" class="btn btn-light text-danger btn-sm fw-bold px-3 shadow-sm d-flex align-items-center my-auto rounded-pill">
                    Logout <i class="bi bi-box-arrow-right ms-2"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4 pb-5">
        
        <h2 class="fw-bold mb-3 text-dark">
            Hi, <span id="displayUser" class="text-primary">Guest</span>
        </h2>
        
        <div class="card p-4 mb-4 border-0 shadow-sm rounded-4"
            style="background: linear-gradient(to right, #494bb2, #804cbd);">

            <div class="row align-items-center">
                <div class="col-md-5 mb-3 mb-md-0">
                    <h4 class="fw-bold text-white mb-1">What did you find?</h4>
                    <p class="text-white small mb-0">Help your campus friends reconnect.</p>
                </div>
                
                <div class="col-md-7">
                    <div class="row g-2">
                        <div class="col-12 col-md-7">
                            <div class="input-group shadow-sm rounded-pill overflow-hidden border">
                                <span class="input-group-text bg-white border-0 ps-3"><i class="bi bi-search text-muted"></i></span>
                                <input type="text" id="searchInput" class="form-control border-0" placeholder="Search items..." onkeyup="loadItems()">
                            </div>
                        </div>
                        <div class="col-12 col-md-5">
                            <select id="categoryFilter" class="form-select rounded-pill shadow-sm border" onchange="loadItems()" style="cursor: pointer;">
                                <option value="">All Types</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Documents">Documents/Card</option>
                                <option value="Clothing">Clothing</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mb-5">
            <button class="btn btn-lg rounded-pill px-4 shadow fw-bold text-white w-auto" 
                    style="background: linear-gradient(to right,#494bb2, #804cbd);"
                    data-bs-toggle="modal" data-bs-target="#postItemModal">
                <i class="bi bi-plus-lg me-2"></i> Post New Item
            </button>
        </div>
        
        <div id="itemsList" class="row">
            <div class="text-center mt-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2">Loading items...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="postItemModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                
                <div class="modal-header border-0 p-4 d-flex flex-column align-items-center position-relative" style="background: linear-gradient(to right, #494bb2, #804cbd);">
                    
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
                    
                    <div class="text-center text-white">
                        <h3 class="fw-bold mb-1">Found Something?</h3>
                        <p class="mb-0 small opacity-75">Fill in the details to help it find its owner.</p>
                    </div>
                </div>

                <div class="modal-body p-4 pt-3">
                    
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">ITEM NAME</label>
                            <input type="text" name="item_name" class="form-control bg-light" required placeholder="e.g. Blue Wallet">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">CATEGORY</label>
                            <select name="category" class="form-select bg-light" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Documents">Documents (ID/Card)</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Clothing">Clothing/Accessories</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">LOCATION FOUND</label>
                            <input type="text" name="location_found" class="form-control bg-light" required placeholder="e.g. DKG 2/1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DATE & TIME</label>
                            <input type="datetime-local" id="dateFound" name="date_found" class="form-control bg-light" required 
                                    onfocus="var d=new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); this.max=d.toISOString().slice(0,16);"> 

                    </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DESCRIPTION</label>
                            <textarea name="description" class="form-control bg-light" rows="1" 
                                      required placeholder="Describe colour, brand, or, features..."
                                      style="overflow:hidden; resize:none; min-height: 70px;"
                                      oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">YOUR CONTACT NUMBER</label>
    
                            <input type="tel" name="contact_phone" class="form-control bg-light" 
                                    required placeholder="0123456789" 
                                    oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">PHOTO EVIDENCE</label>
                            
                            <input type="file" name="cameraInput[]" class="form-control" accept="image/*" multiple required
                                   onchange="if(this.files.length > 5) { Swal.fire('Too many photos', 'Maximum 5 photos allowed.', 'warning'); this.value=''; }">
                            
                            <div class="form-text text-primary">Required. Max 5 photos.</div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm" style="background-color: #6200ea;">
                                Post Item <i class="bi bi-send-fill ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/app.js?v=999"></script> <script>
        $(document).ready(function(){
            checkSession();
            loadItems();
        });

        $(document).ready(function() {
        var now = new Date().toISOString().slice(0, 16); 
        var year = now.getFullYear();
        var month = (now.getMonth() + 1).toString().padStart(2, '0');
        var day = now.getDate().toString().padStart(2, '0');
        var hours = now.getHours().toString().padStart(2, '0');
        var minutes = now.getMinutes().toString().padStart(2, '0');
        
        var maxDateTime = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
        
        // Target the input inside the modal
        $('input[name="date_found"]').attr('max', maxDateTime);
        $('input[name="date_found"]').val(maxDateTime);
    });

    </script>
</body>
</html>
