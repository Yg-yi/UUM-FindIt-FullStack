 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .page-header {
            background: linear-gradient(to right, #494bb2, #804cbd);
            padding: 40px 20px 80px 20px;
            border-radius: 0 0 30px 30px;
            color: white;
            text-align: center;
        }
        .form-card {
            margin-top: -50px; 
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h2 class="fw-bold mb-1">Update Item</h2>
        <p class="opacity-75 mb-0">Change status or correct details.</p>
    </div>

    <div class="container pb-5">
        <div class="card form-card p-4">
            
            <div class="mb-4">
                <h5 class="fw-bold text-primary mb-0">Edit Details</h5>
            </div>

            <form id="editForm">
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold text-uppercase">Item Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-primary"><i class="bi bi-tag-fill"></i></span>
                        <input type="text" id="itemName" name="item_name" class="form-control border-start-0 ps-0" required>
                    </div>
                </div>

                <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">CATEGORY</label>
                        <select id="edit_cat" name="category" class="form-select bg-light border-0" required>
                            <option value="Electronics">Electronics</option>
                            <option value="Documents">Documents (ID/Card)</option>
                            <option value="Clothing">Clothing/Accessories</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">LOCATION FOUND</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt text-danger"></i></span>
                            <input type="text" id="edit_loc" name="location_found" class="form-control bg-light border-start-0 border-0" required>
                        </div>
                    </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold text-uppercase">Description</label>
                    <textarea id="desc" name="description" class="form-control" rows="3" required></textarea>
                </div>

                <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">CONTACT NUMBER</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-telephone text-success"></i></span>
                            <input type="tel" id="edit_phone" name="contact_phone" class="form-control bg-light border-0" 
                                   required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <div class="form-text">Update your phone number if necessary.</div>
                    </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold text-uppercase">Current Status</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-warning"><i class="bi bi-info-circle-fill"></i></span>
                        <select id="status" name="status" class="form-select border-start-0 ps-0">
                            <option value="Unclaimed">Unclaimed</option>
                            <option value="Pending">Pending Pickup</option>
                            <option value="Returned">Returned to Owner</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg shadow mb-3 rounded-pill" style="background-color: #6200ea; border-color: #6200ea;">
                    Save Changes <i class="bi bi-check-lg"></i>
                </button>

                <a href="detail.html" class="btn btn-outline-danger w-100 rounded-pill">
                    <i class="bi bi-arrow-left"></i> Cancel
                </a>

            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <script>
        $(document).ready(function() {
    // 1. Get ID from URL or Session (Better for direct links)
    var urlParams = new URLSearchParams(window.location.search);
    var id = urlParams.get('id') || sessionStorage.getItem("current_item_id");

    if(!id) { 
        window.location.href = "index.html"; 
        return; 
    }

    // 2. Load current data
    $.get("https://uumfindit.atwebpages.com/php/api.php?action=read_one&id=" + id, function(data) {
        if(data && !data.error) {
            // MATCHING THE HTML IDs:
            // itemName matches id="itemName"
            // desc matches id="desc"
            $("#itemName").val(data.item_name);
            $("#edit_cat").val(data.category);
            $("#edit_loc").val(data.location_found);
            $("#desc").val(data.description);
            $("#edit_phone").val(data.contact_phone);
            $("#status").val(data.status); 
        } else {
            Swal.fire('Error', 'Could not load item details', 'error');
        }
    }, "json");

    // 3. Handle Submit
    $("#editForm").on("submit", function(e) {
        e.preventDefault(); 

        Swal.fire({
            title: 'Save Changes?',
            text: "Are you sure you want to update this item?",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#6200ea',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Yes, Save it!',
            cancelButtonText: 'Cancel'
        }).then((result) => {
            if (result.isConfirmed) {
                
                Swal.fire({
                    title: 'Updating...',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                });

                // Attach action and ID to the serialized form data
                var formData = $(this).serialize() + "&action=update&id=" + id;

                $.post("https://uumfindit.atwebpages.com/php/api.php", formData, function(res) {
                    if(res.status === "success") {
                        Swal.fire('Saved!', 'Your item has been updated.', 'success')
                        .then(() => {
                            window.location.href = "detail.html?id=" + id; 
                        });
                    } else {
                        Swal.fire('Error', 'Error updating item.', 'error');
                    }
                }, "json").fail(function() {
                    Swal.fire('Error', 'Could not connect to server.', 'error');
                });
            }
        });
    });
});
    </script>
</body>
</html>
