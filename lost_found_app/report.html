<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .page-header {
            background: var(--primary-gradient);
            padding: 40px 20px 80px 20px;
            border-radius: 0 0 30px 30px;
            color: white;
            text-align: center;
        }
        .form-card {
            margin-top: -50px; 
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        #desc {
            resize: none; overflow: hidden; min-height: 80px;
            background-color: #f8f9fa;
        }
        .photo-error {
            border-color: #dc3545 !important;
            background-color: #fff8f8 !important;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h2 class="fw-bold mb-1">Found Something?</h2>
        <p class="opacity-75 mb-0">Fill in the details to help it find its owner.</p>
    </div>

    <div class="container pb-5">
        <div class="card form-card p-4">
            
            <div class="mb-4">
                <h5 class="fw-bold text-primary mb-0">Item Details</h5>
            </div>

            <form id="reportForm">
                
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold text-uppercase">What is it?</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-primary"><i class="bi bi-tag-fill"></i></span>
                        <input type="text" id="itemName" name="item_name" class="form-control border-start-0 ps-0" placeholder="e.g. Blue Wallet" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold text-uppercase">Category</label>
                    <select id="category" name="category" class="form-select" required>
                        <option value="" disabled selected>Select Category...</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Documents">Documents/Card</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="mb-3" id="photoSection">
                    <label class="form-label small fw-bold text-muted">PHOTO EVIDENCE (Max 5)</label>
    
    <div id="photoBox" class="p-4 border rounded bg-light text-center" 
         style="border-style: dashed !important; cursor: pointer;" 
         onclick="document.getElementById('cameraInput').click();">
         
        <i class="bi bi-camera-fill text-primary" style="font-size: 2rem;"></i>
        <div class="fw-bold text-primary mt-2">Take Photo / Upload</div>
        <div class="small text-muted">Tap here to access Camera or Gallery</div>
    </div>

    <input type="file" id="cameraInput" name="cameraInput[]" 
           accept="image/*" multiple class="d-none">
           
    <div class="small text-muted mt-2" id="fileName">Required. Max 5 photos.</div>
</div>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold text-uppercase">Description</label>
                    <textarea id="desc" name="description" class="form-control" rows="1" placeholder="Describe color, brand, or features..." required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Location Found</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-danger"><i class="bi bi-geo-alt-fill"></i></span>
                            <input type="text" id="location" name="location_found" class="form-control border-start-0 ps-0" placeholder="e.g. DKG 5" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small fw-bold text-uppercase">Date & Time</label>
                        <input type="datetime-local" id="dateFound" name="date_found" class="form-control bg-light" required 
                                    onfocus="var d=new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); this.max=d.toISOString().slice(0,16);"> 

                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold text-uppercase">Your Contact Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-success"><i class="bi bi-whatsapp"></i></span>
                        <input type="tel" id="contact" name="contact_phone" class="form-control border-start-0 ps-0" placeholder="0123456789" required>
                    </div>
                    <div id="phoneError" class="text-danger small mt-1 d-none">
                        <i class="bi bi-exclamation-circle"></i> Only numbers allowed!
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg shadow mb-3">
                    Submit Report <i class="bi bi-arrow-right-short"></i>
                </button>

                <a href="index.html" class="btn btn-outline-danger w-100 rounded-pill">
                    <i class="bi bi-x-lg"></i> Cancel
                </a>

            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Auto Expand Textarea
        const tx = document.getElementById("desc");
        const autoResize = () => { tx.style.height = "auto"; tx.style.height = tx.scrollHeight + "px"; };
        tx.addEventListener("input", autoResize);

        // Photo Handling
        document.getElementById('cameraInput').addEventListener('change', function(){
            var files = this.files;
            var text = document.getElementById('fileName');
            var box = document.getElementById('photoBox');
            if(files.length > 0) { box.classList.remove("photo-error"); }
            if (files.length === 0) {
                text.textContent = "Please select at least 1 photo."; text.className = "small text-danger fw-bold mt-2";
            } else if (files.length > 5) {
                text.textContent = "Error: Maximum 5 photos allowed."; text.className = "small text-danger fw-bold mt-2"; this.value = ""; 
            } else {
                text.textContent = "✓ " + files.length + " photo(s) selected"; text.className = "small text-success fw-bold mt-2";
            }
        });

        // Contact Number Check
        document.getElementById('contact').addEventListener('input', function(e) {
            var value = this.value;
            if (/[^0-9]/.test(value)) { document.getElementById('phoneError').classList.remove('d-none'); this.value = value.replace(/[^0-9]/g, ''); } 
            else { document.getElementById('phoneError').classList.add('d-none'); }
        });

        // Restrict Date to prevent future dates
$(document).ready(function() {
    var now = new Date();
    var year = now.getFullYear();
    var month = (now.getMonth() + 1).toString().padStart(2, '0');
    var day = now.getDate().toString().padStart(2, '0');
    var hours = now.getHours().toString().padStart(2, '0');
    var minutes = now.getMinutes().toString().padStart(2, '0');
    
    // Format: YYYY-MM-DDTHH:MM
    var maxDateTime = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
    
    // Apply to the input in report.html
    $('#dateFound').attr('max', maxDateTime);
    $('#dateFound').val(maxDateTime); // Default to current time
});  

$(document).ready(function() {
    // Get local time instead of UTC to avoid timezone errors
    var now = new Date();
    var tzoffset = now.getTimezoneOffset() * 60000; // offset in milliseconds
    var localISOTime = (new Date(now - tzoffset)).toISOString().slice(0, 16);

    // Apply to the input
    $('#dateFound').attr('max', localISOTime);
    $('#dateFound').val(localISOTime); 
});

        // Submit Validation
        document.getElementById('reportForm').addEventListener('submit', function(e) {
            var files = document.getElementById('cameraInput').files;
            if(files.length < 1) {
                e.preventDefault(); e.stopPropagation();
                var box = document.getElementById('photoBox');
                var text = document.getElementById('fileName');
                box.classList.add("photo-error");
                text.textContent = "⚠️ You must insert photo evidence!";
                text.className = "small text-danger fw-bold mt-2";
                box.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });
    </script>
</body>
</html>
