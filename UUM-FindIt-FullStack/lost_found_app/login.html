<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UUM FindIt</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        .login-card {
            background: white;
            padding: 30px; /* Reduced padding for mobile */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            
            /* RESPONSIVE FIX START */
            width: 90%;          /* Take 90% of screen on phone */
            max-width: 400px;    /* But never bigger than 400px on PC */
            margin: 20px;        /* Add space around it */
            /* RESPONSIVE FIX END */
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn-login:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="mb-4 text-primary">
            <i class="bi bi-search-heart" style="font-size: 3rem;"></i>
            <h3 class="fw-bold mt-2">UUM FindIt</h3>
            <p class="text-muted small">Campus Lost & Found</p>
        </div>

        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control rounded-4" id="usernameInput" placeholder="Enter Username" required>
                <label for="usernameInput">Enter Username</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill btn-login shadow mt-2">
                Login Now
            </button>
        </form>

        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $("#loginForm").on("submit", function(e) {
            e.preventDefault(); // Stop the form from reloading the page

            // 1. Get the value you typed
            var user = $("#usernameInput").val().trim();

            if(user === "") {
                alert("Please enter a username!");
                return;
            }

            // 2. SAVE TO BROWSER MEMORY 
            localStorage.setItem("username", user);

            // 3. Redirect to Dashboard
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
